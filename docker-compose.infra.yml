version: "3.8"

# ============================================================================
# INFRASTRUCTURE STACK - Traefik + Portainer
# Deploy once: docker stack deploy -c docker-compose.infra.yml infra
# ============================================================================

services:
  # ── Traefik - Reverse Proxy & SSL ──────────────────────────────────────
  traefik:
    image: traefik:v3.6
    command:
      # API / Dashboard
      - --api.dashboard=true
      - --api.insecure=true
      # Docker Swarm provider
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP → HTTPS redirect
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      # Let's Encrypt SSL
      - --certificatesresolvers.letsencrypt.acme.email=admin@metrixbr.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # Logging
      - --log.level=INFO
      - --accesslog=true
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s

  # ── Portainer - Container Management UI ────────────────────────────────
  portainer:
    image: portainer/portainer-ce:2.33.0
    command: -H unix:///var/run/docker.sock
    ports:
      - target: 9000
        published: 9000
        mode: host
      - target: 9443
        published: 9443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - traefik-public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        # HTTPS router for painel.metrixbr.com
        - traefik.http.routers.portainer.rule=Host(`painel.metrixbr.com`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls.certresolver=letsencrypt
        - traefik.http.services.portainer.loadbalancer.server.port=9000

volumes:
  traefik-letsencrypt:
    driver: local
  portainer-data:
    driver: local

networks:
  traefik-public:
    external: true
